<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #todo-container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 4px; }
        input[type='text'] { width: calc(100% - 50px); padding: 10px; }
        input[type='button'] { padding: 10px; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 8px; margin: 5px 0; background: #f4f4f4; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="todo-container">
        <h2>To-Do List</h2>
        <input type="text" id="task-input" placeholder="Add a new task...">
        <input type="button" id="add-button" value="Add">
        <ul id="task-list"></ul>
    </div>

    <script>
        const addButton = document.getElementById('add-button');
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');

        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.textContent = task;
                li.addEventListener('click', () => removeTask(index));
                taskList.appendChild(li);
            });
        }

        function addTask() {
            const task = taskInput.value;
            if (task) {
                tasks.push(task);
                taskInput.value = '';
                saveTasks();
                renderTasks();
            }
        }

        function removeTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        addButton.addEventListener('click', addTask);
        renderTasks();
    </script>
</body>
</html>
